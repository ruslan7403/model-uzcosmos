###############################################################################
# Continuous Training Workflow for Mapillary Traffic Sign Dataset
#
# Trains the embedding model on ALL Mapillary traffic sign images.
# Handles GitHub's 6-hour workflow time limit by:
#   1. Training for ~5.5 hours (leaving 30min buffer for setup/push)
#   2. Pushing checkpoint + model to a dedicated branch (training-checkpoints)
#   3. Waiting 5 minutes, then re-triggering itself to continue
#   4. Repeating until all epochs are completed
#   5. Final model is pushed to the source branch directly
#
# Dataset is downloaded from predefined URLs (no API token required).
#
# Manual trigger: Actions → "Train on Mapillary Dataset" → Run workflow
###############################################################################

name: Train on Mapillary Dataset

on:
  workflow_dispatch:
    inputs:
      run_number:
        description: "Chain run number (auto-incremented, start at 1)"
        required: false
        default: "1"
      continue_training:
        description: "Set to 'true' when auto-continuing from a previous run"
        required: false
        default: "false"
      epochs:
        description: "Total training epochs"
        required: false
        default: "100"
      batch_size:
        description: "Training batch size"
        required: false
        default: "32"
      triplets_per_epoch:
        description: "Triplets sampled per epoch"
        required: false
        default: "10000"

# Only allow one training chain at a time
concurrency:
  group: mapillary-training
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"
  # 5.5 hours in seconds — leaves 30min buffer for setup, download, push
  TRAIN_TIME_LIMIT: "19800"
  DATASET_CACHE_KEY: "mapillary-dataset-links-v1"
  CHECKPOINT_BRANCH: "training-checkpoints"

jobs:
  train:
    name: "Training run #${{ github.event.inputs.run_number }}"
    runs-on: ubuntu-latest
    timeout-minutes: 355  # just under 6 hours

    permissions:
      contents: write

    steps:
      # ------------------------------------------------------------------ #
      # Setup
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      # ------------------------------------------------------------------ #
      # Dataset: download once, then cache across runs
      # ------------------------------------------------------------------ #
      - name: Restore dataset cache
        id: dataset-cache
        uses: actions/cache@v4
        with:
          path: data/mapillary
          key: ${{ env.DATASET_CACHE_KEY }}

      - name: Download Mapillary dataset (if not cached)
        if: steps.dataset-cache.outputs.cache-hit != 'true'
        run: |
          python scripts/download_from_links.py --output-dir data/mapillary

      - name: Print dataset summary
        run: |
          echo "=== Dataset summary ==="
          total=0
          for dir in data/mapillary/*/; do
            if [ -d "$dir" ]; then
              name=$(basename "$dir")
              count=$(find "$dir" -maxdepth 1 -type f \( -name "*.jpg" -o -name "*.png" \) | wc -l)
              if [ "$count" -gt 0 ]; then
                echo "  $name: $count images"
                total=$((total + count))
              fi
            fi
          done
          echo "  TOTAL: $total images"

      # ------------------------------------------------------------------ #
      # Restore checkpoint from the checkpoint branch (if continuing)
      # ------------------------------------------------------------------ #
      - name: Restore checkpoint from repo
        if: github.event.inputs.continue_training == 'true'
        run: |
          # Check if the checkpoint branch exists on the remote
          if git ls-remote --exit-code --heads origin "$CHECKPOINT_BRANCH" >/dev/null 2>&1; then
            echo "Fetching checkpoint from branch: $CHECKPOINT_BRANCH"
            git fetch origin "$CHECKPOINT_BRANCH"

            # Extract just the output/ files from that branch
            mkdir -p output
            git checkout "origin/$CHECKPOINT_BRANCH" -- output/ 2>/dev/null || true

            if [ -f output/checkpoint.pt ]; then
              echo "Checkpoint restored successfully"
              cat output/training_status.json 2>/dev/null || true
            else
              echo "No checkpoint.pt found on $CHECKPOINT_BRANCH"
            fi
          else
            echo "Checkpoint branch does not exist yet — starting fresh"
          fi

      - name: Show checkpoint status
        run: |
          if [ -f output/checkpoint.pt ]; then
            echo "Checkpoint found — will resume training"
            ls -lh output/checkpoint.pt
            cat output/training_status.json 2>/dev/null || echo "(no status file yet)"
          else
            echo "No checkpoint — starting fresh"
          fi

      # ------------------------------------------------------------------ #
      # Train (time-limited with checkpointing)
      # ------------------------------------------------------------------ #
      - name: Train model
        run: |
          CHECKPOINT_ARG=""
          if [ -f output/checkpoint.pt ]; then
            CHECKPOINT_ARG="--checkpoint output/checkpoint.pt"
          fi

          python scripts/train.py \
            --data-dir data/mapillary \
            --output-dir output \
            --epochs ${{ github.event.inputs.epochs }} \
            --batch-size ${{ github.event.inputs.batch_size }} \
            --triplets-per-epoch ${{ github.event.inputs.triplets_per_epoch }} \
            --embedding-dim 128 \
            --learning-rate 1e-4 \
            --margin 0.3 \
            --image-size 224 \
            --gallery-threshold 0.6 \
            --time-limit ${{ env.TRAIN_TIME_LIMIT }} \
            --checkpoint-interval 1 \
            $CHECKPOINT_ARG

      - name: Print training status
        run: cat output/training_status.json

      # ------------------------------------------------------------------ #
      # Push checkpoint + model to the checkpoint branch
      # ------------------------------------------------------------------ #
      - name: Push checkpoint to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create an orphan checkpoint branch if it doesn't exist,
          # or check it out if it does
          if git ls-remote --exit-code --heads origin "$CHECKPOINT_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$CHECKPOINT_BRANCH"
            git checkout "$CHECKPOINT_BRANCH"
          else
            git checkout --orphan "$CHECKPOINT_BRANCH"
            git rm -rf . 2>/dev/null || true
          fi

          # Copy output files into the branch
          mkdir -p output
          git checkout "${{ github.ref_name }}" -- . 2>/dev/null || true
          # The training output files are in the working directory already
          # (they persist across git checkout since they're untracked)

          git add output/checkpoint.pt output/training_status.json \
                  output/best_model.pth output/final_model.pth \
                  output/gallery.json output/gallery.npz 2>/dev/null || true

          git commit -m "Training run #${{ github.event.inputs.run_number }} checkpoint

          Epochs: $(python -c "import json; s=json.load(open('output/training_status.json')); print(f\"{s['epochs_done']}/{s['total_epochs']}\")")
          Best loss: $(python -c "import json; s=json.load(open('output/training_status.json')); print(f\"{s['best_loss']:.4f}\")")
          Status: $(python -c "import json; s=json.load(open('output/training_status.json')); print('COMPLETED' if s['completed'] else 'IN PROGRESS')")" || echo "No changes to commit"

          git push origin "$CHECKPOINT_BRANCH" --force

          # Switch back to the source branch for the rest of the workflow
          git checkout "${{ github.ref_name }}"

      # ------------------------------------------------------------------ #
      # If training is fully done, also push final model to source branch
      # ------------------------------------------------------------------ #
      - name: Check if training is complete
        id: check-done
        run: |
          completed=$(python -c "
          import json
          with open('output/training_status.json') as f:
              status = json.load(f)
          print('true' if status['completed'] else 'false')
          ")
          echo "completed=$completed" >> "$GITHUB_OUTPUT"

          epochs_done=$(python -c "
          import json
          with open('output/training_status.json') as f:
              status = json.load(f)
          print(status['epochs_done'])
          ")
          echo "epochs_done=$epochs_done" >> "$GITHUB_OUTPUT"

          echo "Training completed: $completed (epochs done: $epochs_done)"

      - name: Push final model to source branch
        if: steps.check-done.outputs.completed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p output
          git add output/best_model.pth output/final_model.pth \
                  output/gallery.json output/gallery.npz \
                  output/training_status.json

          git commit -m "Add trained model from Mapillary dataset (100% complete)

          Trained on ALL Mapillary Traffic Sign images over ${{ github.event.inputs.run_number }} workflow run(s).
          Epochs: ${{ steps.check-done.outputs.epochs_done }}/${{ github.event.inputs.epochs }}
          Best loss: $(python -c "import json; s=json.load(open('output/training_status.json')); print(f\"{s['best_loss']:.4f}\")")" || echo "No changes to commit"

          git push origin "${{ github.ref_name }}"

      # ------------------------------------------------------------------ #
      # If not done: wait 5 min, re-trigger
      # ------------------------------------------------------------------ #
      - name: Wait 5 minutes before continuing
        if: steps.check-done.outputs.completed == 'false'
        run: |
          echo "Training not complete (${{ steps.check-done.outputs.epochs_done }}/${{ github.event.inputs.epochs }} epochs)."
          echo "Waiting 5 minutes before triggering next run..."
          sleep 300

      - name: Trigger next training run
        if: steps.check-done.outputs.completed == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEXT_RUN=$(( ${{ github.event.inputs.run_number }} + 1 ))
          echo "Triggering run #${NEXT_RUN}..."

          gh workflow run train-mapillary.yml \
            --ref ${{ github.ref_name }} \
            -f run_number="${NEXT_RUN}" \
            -f continue_training="true" \
            -f epochs="${{ github.event.inputs.epochs }}" \
            -f batch_size="${{ github.event.inputs.batch_size }}" \
            -f triplets_per_epoch="${{ github.event.inputs.triplets_per_epoch }}"

          echo "Next run triggered successfully!"

      - name: Training complete summary
        if: steps.check-done.outputs.completed == 'true'
        run: |
          echo "============================================="
          echo "   TRAINING COMPLETE!"
          echo "============================================="
          echo ""
          echo "Total runs: ${{ github.event.inputs.run_number }}"
          echo "Epochs completed: ${{ steps.check-done.outputs.epochs_done }}"
          echo ""
          echo "Model has been pushed to branch: ${{ github.ref_name }}"
          echo "  - output/best_model.pth"
          echo "  - output/final_model.pth"
          echo "  - output/gallery.json"
          echo "  - output/gallery.npz"
          echo ""
          cat output/training_status.json
